name: NYXOR Audit
description: >-
  Run a NYXOR security audit (DNS + TLS + HTTP, SSL-Labs-style letter grade)
  against a domain, entirely on GitHub-hosted runners. No server, no PyPI
  publish, no account to sign up for.
author: ivnovomi
branding:
  icon: shield
  color: purple

inputs:
  target:
    description: Domain to audit (e.g. example.com)
    required: true
  report-path:
    description: >-
      Path to write the report to. Format is inferred from the extension
      (.json, .md, .html, .sarif — pipe .sarif into
      github/codeql-action/upload-sarif for GitHub Security tab alerts).
      Leave empty to skip writing a report.
    required: false
    default: nyxor-report.html
  badge-path:
    description: Path to write the SVG grade badge to. Leave empty to skip.
    required: false
    default: nyxor-badge.svg
  unsafe:
    description: Allow NyxScript's python:/pip escape hatches (not used by this action itself).
    required: false
    default: "false"
  nyxor-ref:
    description: Git ref of ivnovomi/nyxor to install (branch, tag, or commit).
    required: false
    default: main
  pr-comment:
    description: >-
      Post the grade as a comment on the pull request this action ran on.
      Only fires on `pull_request` events; the calling workflow needs
      `permissions: pull-requests: write`. No-op otherwise.
    required: false
    default: "true"
  fail-on:
    description: >-
      Severity to gate on (critical, high, medium, low, or info). Leave
      empty (the default) to skip the check entirely. This action never
      fails itself over findings — a composite action failing partway
      loses its own outputs, which would take `grade` down with it. Check
      the `exceeded-fail-on` output in your own workflow instead (see the
      README for the one-line pattern); reports/badges/PR comments get
      written either way regardless of what you do with it.
    required: false
    default: ""

outputs:
  grade:
    description: Letter grade (A+ down to F).
    value: ${{ steps.audit.outputs.grade }}
  exceeded-fail-on:
    description: >-
      "true" if `fail-on` was set and a finding met or exceeded it,
      "false" otherwise (including when `fail-on` was left empty).
    value: ${{ steps.audit.outputs.exceeded }}

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Run audit
      id: audit
      shell: bash
      env:
        NYXOR_TARGET: ${{ inputs.target }}
        NYXOR_REPORT_PATH: ${{ inputs.report-path }}
        NYXOR_BADGE_PATH: ${{ inputs.badge-path }}
        NYXOR_REF: ${{ inputs.nyxor-ref }}
        NYXOR_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        # This step (and this whole composite action) never exits non-zero
        # over `--fail-on` on purpose: if a composite action step fails,
        # none of its declared `outputs:` reach the calling workflow —
        # including `grade`, which has nothing to do with fail-on. So
        # `nyx audit --fail-on` exiting non-zero is captured into the
        # `exceeded` output below instead, and it's up to the calling
        # workflow to act on it (see README). Note GitHub runs `shell: bash`
        # as `bash -e -o pipefail {0}` regardless of what's set here, so the
        # `uv tool run | tee` pipeline below needs its own `|| true` to keep
        # a non-zero `nyx` exit from killing the step outright.
        set -uo pipefail

        # Values above arrive via env: (not spliced into this script by
        # GitHub's expression templating) so they're treated as inert data
        # by bash, not as script text — a target/ref containing `$(...)`
        # or backticks can't break out and run arbitrary commands on the
        # runner. (Don't write a literal double-brace expression marker in
        # a run: comment — GitHub tries to parse it as an expression even
        # inside a comment, and an empty one breaks the whole workflow.)

        args=(nyx)
        if [ -n "$NYXOR_REPORT_PATH" ]; then
          args+=(--output "$NYXOR_REPORT_PATH")
        fi
        args+=(audit "$NYXOR_TARGET")
        if [ -n "$NYXOR_BADGE_PATH" ]; then
          args+=(--badge "$NYXOR_BADGE_PATH")
        fi
        if [ -n "$NYXOR_FAIL_ON" ]; then
          args+=(--fail-on "$NYXOR_FAIL_ON")
        fi

        # GitHub invokes `shell: bash` as `bash -e -o pipefail {0}` by
        # default, regardless of any `set` in this script — so a non-zero
        # exit from `nyx` here (expected and handled below via PIPESTATUS)
        # would otherwise kill the whole step immediately, before any of
        # the exceeded/grade handling below runs. `|| true` neutralizes
        # that implicit `-e` for this one pipeline; PIPESTATUS still gives
        # us the real exit code right after.
        uv tool run --python 3.13 \
          --from "nyxor @ git+https://github.com/ivnovomi/nyxor@${NYXOR_REF}" \
          "${args[@]}" | tee nyxor-audit.log || true
        audit_exit=${PIPESTATUS[0]}

        # Rich may wrap the "(grade X)" line across two lines in a narrow
        # terminal — join everything before matching so the grade is found
        # regardless of wrapping.
        grade=$(tr '\n' ' ' < nyxor-audit.log | grep -oP '(?<=grade )[A-Za-z+-]+(?=\))' | tail -1 || true)
        if [ -z "$grade" ]; then
          echo "::warning::Could not parse a grade from nyx audit's output."
          grade="unknown"
        fi
        echo "grade=$grade" >> "$GITHUB_OUTPUT"

        if [ -n "$NYXOR_FAIL_ON" ] && [ "$audit_exit" -ne 0 ]; then
          echo "exceeded=true" >> "$GITHUB_OUTPUT"
        else
          echo "exceeded=false" >> "$GITHUB_OUTPUT"
        fi

        {
          echo "### NYXOR audit — $NYXOR_TARGET"
          echo ""
          echo "Grade: **$grade**"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Comment on the pull request
      if: inputs.pr-comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        NYXOR_TARGET: ${{ inputs.target }}
        GRADE: ${{ steps.audit.outputs.grade }}
      run: |
        set -euo pipefail

        body="### 🛡️ NYXOR audit — \`$NYXOR_TARGET\`

        Grade: **$GRADE**

        <sub>via [nyxor](https://github.com/ivnovomi/nyxor)</sub>"

        gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
